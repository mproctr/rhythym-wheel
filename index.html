function getMelodyPlayableMap(mel) {
  const uniqueNotes = [...new Set(mel.notes.map(n => n.note))].slice(0, 4);
  const noteToBtn = {};
  uniqueNotes.forEach((n, i) => { noteToBtn[n] = i; });
  return { uniqueNotes, noteToBtn };
}

// ============================================================
// PATTERN GEN
// ============================================================
function generateRound(roundNum) {
  const mel = MELODY_LIBRARY[roundNum % MELODY_LIBRARY.length];
  const numSlots = mel.numSlots;
  const bpm = mel.bpm;
  const melodyActive = roundNum >= MELODY_UNLOCK_ROUND;
  const unlockedDrums = DRUM_VOICES.filter((_, i) => roundNum >= DRUM_UNLOCK[i]);
  const density = Math.min(BASE_DENSITY + roundNum * DENSITY_PER_ROUND, MAX_DENSITY);
  const synthPreset = SYNTH_PRESETS[roundNum % SYNTH_PRESETS.length];
  const { uniqueNotes, noteToBtn } = getMelodyPlayableMap(mel);

  const drumHits = [];
  for (let s = 1; s < numSlots; s++) {
    if (Math.random() < density) {
      const vi = DRUM_VOICES.indexOf(unlockedDrums[Math.floor(Math.random() * unlockedDrums.length)]);
      drumHits.push({ slot: s, type: "drum", voiceIdx: vi });
    }
  }
  if (drumHits.length < 2) {
    drumHits.push({ slot: 1, type: "drum", voiceIdx: 0 });
    drumHits.push({ slot: Math.floor(numSlots / 2), type: "drum", voiceIdx: 0 });
  }

  const newDrumIdx = DRUM_UNLOCK.indexOf(roundNum);
  if (newDrumIdx !== -1) {
    const newVi = newDrumIdx;
    const existing = drumHits.filter(h => h.voiceIdx === newVi);
    const needed = 2 - existing.length;
    if (needed > 0) {
      const usedSlots = new Set(drumHits.map(h => h.slot));
      const candidates = [];
      for (let s = 1; s < numSlots; s++) { if (!usedSlots.has(s)) candidates.push(s); }
      for (let n = 0; n < needed && candidates.length > 0; n++) {
        const pick = candidates.splice(Math.floor(candidates.length / (needed - n + 1)), 1)[0];
        drumHits.push({ slot: pick, type: "drum", voiceIdx: newVi });
      }
    }
  }
  const usedDrumSlots = new Set(drumHits.map(h => h.slot));

  const melodyHits = [];
  if (melodyActive) {
    const roundsSinceUnlock = roundNum - MELODY_UNLOCK_ROUND;
    const maxMelodyNotes = roundsSinceUnlock <= 1 ? 2 : roundsSinceUnlock === 2 ? 3 : 4;
    const eligibleSlots = mel.playableSlots.slice(0, maxMelodyNotes);
    for (const slot of eligibleSlots) {
      const melNote = mel.notes.find(n => n.slot === slot);
      if (!melNote || usedDrumSlots.has(slot)) continue;
      const btnIdx = noteToBtn[melNote.note] ?? 0;
      melodyHits.push({ slot, type: "melody", noteIdx: btnIdx, note: melNote.note });
    }
  }

  const bgMelody = mel.notes
    .filter(n => !usedDrumSlots.has(n.slot) && !melodyHits.some(m => m.slot === n.slot))
    .map(n => ({ slot: n.slot, note: n.note, noteIdx: noteToBtn[n.note] ?? 0 }));

  const padChords = mel.chords.map(c => ({ slot: c.slots[0], notes: c.pad }));
  const bassNotes = mel.chords.map(c => ({ slot: c.slots[0], note: c.bass }));

  const grooveHits = [];
  for (let s = 0; s < numSlots; s++) {
    if (s % 2 === 0) grooveHits.push({ slot: s });
  }

  const allHits = [...drumHits, ...melodyHits].sort((a, b) => a.slot - b.slot);

  return {
    numSlots, bpm, allHits, drumHits, melodyHits, bgMelody,
    bassNotes, padChords, grooveHits,
    synthPreset, melodyActive, unlockedDrums,
    melodyName: mel.name, composer: mel.composer,
    uniqueNotes, noteToBtn,
  };
}

// ============================================================
// DRUM SYNTHS
// ============================================================
function createDrums(dest) {
  const kick = new Tone.MembraneSynth({ pitchDecay:.05,octaves:6,oscillator:{type:"sine"},envelope:{attack:.001,decay:.3,sustain:0,release:.4} }).connect(dest);
  kick.volume.value = 2;
  const snareN = new Tone.NoiseSynth({ noise:{type:"white"},envelope:{attack:.001,decay:.15,sustain:0,release:.1} }).connect(dest);
  snareN.volume.value = -2;
  const snareT = new Tone.MembraneSynth({ pitchDecay:.01,octaves:4,envelope:{attack:.001,decay:.1,sustain:0,release:.05} }).connect(dest);
  const hat = new Tone.MetalSynth({ frequency:400,envelope:{attack:.001,decay:.06,release:.01},harmonicity:5.1,modulationIndex:32,resonance:4000,octaves:1.5 }).connect(dest);
  hat.volume.value = -8;
  const clap = new Tone.NoiseSynth({ noise:{type:"pink"},envelope:{attack:.002,decay:.12,sustain:0,release:.08} }).connect(dest);
  clap.volume.value = -2;
  const grooveHat = new Tone.MetalSynth({ frequency:500,envelope:{attack:.001,decay:.04,release:.008},harmonicity:5.1,modulationIndex:28,resonance:5000,octaves:1 }).connect(dest);
  grooveHat.volume.value = -22;
  const triggers = [
    () => kick.triggerAttackRelease("C1","8n"),
    () => { snareN.triggerAttackRelease("8n"); snareT.triggerAttackRelease("G3","16n"); },
    () => hat.triggerAttackRelease("16n"),
    () => clap.triggerAttackRelease("16n"),
  ];
  const playGrooveHat = () => grooveHat.triggerAttackRelease("32n");
  const dispose = () => [kick,snareN,snareT,hat,clap,grooveHat].forEach(s => s.dispose());
  return { triggers, playGrooveHat, dispose };
}

function RhythmWheel() {
  const [screen,setScreen] = useState("menu");
  const [round,setRound] = useState(0);
  const [score,setScore] = useState(0);
  const [combo,setCombo] = useState(0);
  const [maxCombo,setMaxCombo] = useState(0);
  const [attempts,setAttempts] = useState(1);
  const [passed,setPassed] = useState(false);
  const [roundData,setRoundData] = useState(null);
  const [sweepAngle,setSweepAngle] = useState(-1);
  const [litSlots,setLitSlots] = useState([]);
  const [playerHits,setPlayerHits] = useState([]);
  const [floats,setFloats] = useState([]);
  const [roundStats,setRoundStats] = useState({perfect:0,good:0,missed:0});
  const [countNum,setCountNum] = useState(3);
  const [,forceRender] = useState(0);
  const [ghostHits,setGhostHits] = useState([]);
  const [slowReplayAvail,setSlowReplayAvail] = useState(false);

  const drumsRef = useRef(null), compRef = useRef(null), synthRef = useRef(null);
  const synthRevRef = useRef(null), synthDelRef = useRef(null);
  const bassRef = useRef(null), padRef = useRef(null), padRevRef = useRef(null);
  const animRef = useRef(null), sweepStartRef = useRef(0), rdRef = useRef(null);
  const matchedRef = useRef(new Set()), playerHitsRef = useRef([]);
  const comboRef = useRef(0), scoreRef = useRef(0);
  const statsRef = useRef({perfect:0,good:0,missed:0});
  const listenTriggeredRef = useRef(new Set()), countIntervalRef = useRef(null);
  const savedRoundDataRef = useRef(null);
  const screenRef = useRef("menu"), roundRef = useRef(0), passedRef = useRef(false);
  const drumHlRef = useRef({}), melodyHlRef = useRef({});
  const hitImpactRef = useRef(0), startedRef = useRef(false);

  rdRef.current = roundData;
  screenRef.current = screen;
  roundRef.current = round;
  passedRef.current = passed;

  const isDrumLit = (vi) => drumHlRef.current[vi] && Date.now()-drumHlRef.current[vi]<HL_DUR;
  const isMelodyLit = (ni) => melodyHlRef.current[ni] && Date.now()-melodyHlRef.current[ni]<HL_DUR;

  useEffect(()=>{ const iv=setInterval(()=>forceRender(c=>c+1),100); return()=>clearInterval(iv); },[]);
  useEffect(()=>{ const iv=setInterval(()=>setLitSlots(prev=>{const now=Date.now();const n=prev.filter(s=>now-s.time<500);return n.length!==prev.length?n:prev;}),250); return()=>clearInterval(iv); },[]);

  const initAudio = useCallback(async () => {
    if (startedRef.current) return;
    startedRef.current = true;
    await Tone.start();
    compRef.current = new Tone.Compressor(-18,4).toDestination();
    drumsRef.current = createDrums(compRef.current);
    synthRevRef.current = new Tone.Reverb({decay:2,wet:0.25}).connect(compRef.current);
    synthDelRef.current = new Tone.FeedbackDelay({delayTime:"8n",feedback:0.15,wet:0.12}).connect(synthRevRef.current);
    synthRef.current = new Tone.PolySynth(Tone.Synth,{oscillator:{type:"triangle"},envelope:{attack:0.08,decay:0.3,sustain:0.4,release:0.6}}).connect(synthDelRef.current);
    synthRef.current.maxPolyphony = 6;
    synthRef.current.volume.value = -4;
    bassRef.current = new Tone.MonoSynth({oscillator:{type:"triangle"},envelope:{attack:0.02,decay:0.3,sustain:0.4,release:0.5},filterEnvelope:{attack:0.01,decay:0.2,sustain:0.3,release:0.5,baseFrequency:80,octaves:2}}).connect(compRef.current);
    bassRef.current.volume.value = -14;
    padRevRef.current = new Tone.Reverb({decay:3.5,wet:0.5}).connect(compRef.current);
    padRef.current = new Tone.PolySynth(Tone.Synth,{oscillator:{type:"sine"},envelope:{attack:0.15,decay:0.4,sustain:0.5,release:1.2}}).connect(padRevRef.current);
    padRef.current.maxPolyphony = 4;
    padRef.current.volume.value = -18;
  }, []);

  const playDrum = useCallback((vi) => { drumsRef.current?.triggers[vi](); drumHlRef.current[vi]=Date.now(); }, []);
  const playMelody = useCallback((note,noteIdx) => { synthRef.current?.triggerAttackRelease(note,"8n"); if(noteIdx!=null)melodyHlRef.current[noteIdx]=Date.now(); }, []);
  const playBass = useCallback((note) => { bassRef.current?.triggerAttackRelease(note,"4n"); }, []);
  const playPad = useCallback((note) => { padRef.current?.triggerAttackRelease(note,"4n"); }, []);
  const playPadChord = useCallback((notes) => { notes.forEach(n=>padRef.current?.triggerAttackRelease(n,"2n")); }, []);
  const playGrooveHat = useCallback(() => { drumsRef.current?.playGrooveHat(); }, []);
  const applySynthPreset = useCallback((preset) => { if(!synthRef.current)return; synthRef.current.set({oscillator:preset.oscillator,envelope:preset.envelope}); }, []);

  const evaluateRound = useCallback((data) => {
    let missed = 0;
    data.allHits.forEach((_,i) => { if(!matchedRef.current.has(i))missed++; });
    if(missed>0){comboRef.current=0;setCombo(0);}
    statsRef.current.missed = missed;
    setRoundStats({...statsRef.current});
    const total = data.allHits.length;
    const didPass = total>0?((total-missed)/total)>=PASS_THRESHOLD:true;
    passedRef.current=didPass; setPassed(didPass);
    setSlowReplayAvail(!didPass);
    screenRef.current="result"; setScreen("result");
  }, []);

  const doSlowReplay = useCallback((data) => {
    if(!data)return;
    cancelAnimationFrame(animRef.current);
    listenTriggeredRef.current = new Set();
    setLitSlots([]);
    screenRef.current="listen"; setScreen("listen");
    const SLOW = 0.55;
    const totalDur = data.numSlots*(60/data.bpm)/SLOW;
    const start = performance.now(); sweepStartRef.current = start;
    const anim = () => {
      const elapsed = (performance.now()-start)/1000;
      const progress = elapsed/totalDur;
      if(progress>=1){setSweepAngle(-1);setSlowReplayAvail(false);screenRef.current="result";setScreen("result");return;}
      setSweepAngle(progress);
      data.allHits.forEach((h,i)=>{const t=(h.slot/data.numSlots)*totalDur;if(elapsed>=t&&!listenTriggeredRef.current.has("sr"+i)){listenTriggeredRef.current.add("sr"+i);if(h.type==="drum")playDrum(h.voiceIdx);else playMelody(h.note,h.noteIdx);setLitSlots(prev=>[...prev,{...h,time:Date.now()}]);}});
      data.bgMelody.forEach((m,i)=>{const t=(m.slot/data.numSlots)*totalDur;if(elapsed>=t&&!listenTriggeredRef.current.has("srbg"+i)){listenTriggeredRef.current.add("srbg"+i);playMelody(m.note,null);}});

              :<>
                <button onClick={()=>{setAttempts(prev=>prev+1);beginRound(round,savedRoundDataRef.current);}} style={{fontFamily:"'Orbitron'",fontSize:11,fontWeight:900,letterSpacing:3,padding:"10px 22px",borderRadius:8,cursor:"pointer",background:"#e6394618",border:"2px solid #e63946",color:"#e63946"}}>TRY AGAIN ↻</button>
                {slowReplayAvail&&<button onClick={()=>doSlowReplay(savedRoundDataRef.current)} style={{fontFamily:"'Orbitron'",fontSize:9,fontWeight:700,letterSpacing:2,padding:"7px 16px",borderRadius:8,cursor:"pointer",background:"#ffd16610",border:"1px solid #ffd16655",color:"#ffd166"}}>♩ SLOW REPLAY</button>}
              </>
            }
            <div style={{fontSize:8,color:"#444",letterSpacing:2}}>SPACE / ENTER</div>
          </div>
        </div>
      )}
    </div>
  );
}

// ============================================================
// WHEEL SVG
// ============================================================
function Wheel({numSlots,allHits,bgMelody,sweepAngle,litSlots,playerHits,floats,phase,melodyActive,ghostHits=[],combo=0,hitTime=0}){
  const size=300,cx=size/2,cy=size/2,r=size*0.36,innerR=r-16;
  const slotA=(s)=>(s/numSlots)*TWO_PI-Math.PI/2;
  const sweepRad=sweepAngle>=0?sweepAngle*TWO_PI-Math.PI/2:null;
  const comboGlow=combo>=3?Math.min(combo/15,1):0;
  const ringColor=combo>=10?"#00f5d4":combo>=5?"#ffd166":"#1a1a2e";
  const ringOpacity=combo>=3?0.15+comboGlow*0.3:0;
  return(
    <div style={{position:"relative",width:"clamp(240px,52vw,320px)",aspectRatio:"1",zIndex:10}}>
      <svg viewBox={`0 0 ${size} ${size}`} style={{width:"100%",height:"100%"}}>
        {comboGlow>0&&<circle cx={cx} cy={cy} r={r+8} fill="none" stroke={ringColor} strokeWidth={2} opacity={ringOpacity} style={{filter:`blur(${2+comboGlow*3}px)`}}/>}
        <circle cx={cx} cy={cy} r={r+3} fill="none" stroke={combo>=5?ringColor+"44":"#1a1a2e"} strokeWidth={1}/>
        <circle cx={cx} cy={cy} r={innerR} fill="none" stroke="#111118" strokeWidth={0.5}/>
        <circle cx={cx} cy={cy} r={r*0.4} fill="none" stroke="#0d0d15" strokeWidth={0.5} opacity={0.5}/>
        {Array.from({length:numSlots},(_,i)=>{const a=slotA(i);const beat=numSlots>=8?i%(numSlots/4)===0:i%2===0;return<line key={i} x1={cx+Math.cos(a)*(r-5)} y1={cy+Math.sin(a)*(r-5)} x2={cx+Math.cos(a)*(r+5)} y2={cy+Math.sin(a)*(r+5)} stroke={beat?"#2a2a3a":"#181822"} strokeWidth={beat?1.2:0.6}/>;  })}
        {phase==="listen"&&allHits.map((h,i)=>{
          const a=slotA(h.slot),x=cx+Math.cos(a)*r,y=cy+Math.sin(a)*r;
          const lit=litSlots.some(l=>l.slot===h.slot&&((l.type==="drum"&&h.type==="drum"&&l.voiceIdx===h.voiceIdx)||(l.type==="melody"&&h.type==="melody")));
          const color=h.type==="drum"?DRUM_VOICES[h.voiceIdx].color:MELODY_COLOR;
          return(<g key={`l-${i}`}>{lit&&<circle cx={x} cy={y} r={7} fill="none" stroke={color} strokeWidth={1.5} opacity={0.5}><animate attributeName="r" from="7" to="18" dur="0.4s" fill="freeze"/><animate attributeName="opacity" from="0.7" to="0" dur="0.4s" fill="freeze"/></circle>}{h.type==="melody"?<rect x={x-6} y={y-6} width={12} height={12} rx={3} fill={lit?color:color+"33"} stroke={color+"55"} strokeWidth={1} style={{transition:"fill 0.12s"}}/>:<circle cx={x} cy={y} r={7} fill={lit?color:color+"33"} stroke={color+"55"} strokeWidth={1} style={{transition:"fill 0.12s"}}/>}</g>);
        })}
        {phase==="listen"&&bgMelody.map((m,i)=>{const a=slotA(m.slot),x=cx+Math.cos(a)*innerR,y=cy+Math.sin(a)*innerR;const lit=litSlots.some(l=>l.slot===m.slot&&l.type==="bg");return<circle key={`bg-${i}`} cx={x} cy={y} r={4} fill={lit?MELODY_COLOR+"55":MELODY_COLOR+"15"} style={{transition:"fill 0.15s"}}/>;  })}
        {phase==="play"&&playerHits.map((h,i)=>{
          const a=h.angle01*TWO_PI-Math.PI/2,x=cx+Math.cos(a)*r,y=cy+Math.sin(a)*r;
          const color=h.color||"#888",perf=h.grade==="PERFECT",good=h.grade==="GOOD",dotR=perf?9:good?8:6;
          return(<g key={`ph-${i}`}>{(perf||good)&&<circle cx={x} cy={y} r={dotR} fill="none" stroke={color} strokeWidth={perf?2:1}><animate attributeName="r" from={String(dotR)} to={perf?"24":"16"} dur={perf?"0.5s":"0.3s"} fill="freeze"/><animate attributeName="opacity" from={perf?"0.9":"0.5"} to="0" dur={perf?"0.5s":"0.3s"} fill="freeze"/></circle>}{perf&&<circle cx={x} cy={y} r={dotR} fill="none" stroke="#fff" strokeWidth={1}><animate attributeName="r" from={String(dotR)} to="18" dur="0.35s" fill="freeze"/><animate attributeName="opacity" from="0.6" to="0" dur="0.35s" fill="freeze"/></circle>}{h.type==="melody"?<rect x={x-dotR*0.7} y={y-dotR*0.7} width={dotR*1.4} height={dotR*1.4} rx={3} fill={h.grade?color:color+"44"} stroke={perf?"#fff":color+"55"} strokeWidth={perf?2:1}/>:<circle cx={x} cy={y} r={dotR} fill={h.grade?color:color+"44"} stroke={perf?"#fff":color+"55"} strokeWidth={perf?2:1}/>}</g>);
        })}
        {phase==="play"&&ghostHits.map((g,i)=>{
          const a=slotA(g.slot),x=cx+Math.cos(a)*r,y=cy+Math.sin(a)*r;
          const age=Date.now()-g.time;if(age>1500)return null;
          const opacity=Math.max(0,1-age/1500);
          return(<g key={`ghost-${i}`} opacity={opacity}><circle cx={x} cy={y} r={10} fill="none" stroke={g.color} strokeWidth={1} strokeDasharray="3 2"/><text x={x} y={y+3} textAnchor="middle" fill={g.color} fontSize={6} fontFamily="Orbitron" fontWeight={700}>{g.label}</text></g>);
        })}
        {sweepRad!==null&&<>
          {combo>=3&&phase==="play"&&<line x1={cx} y1={cy} x2={cx+Math.cos(sweepRad)*(r+16)} y2={cy+Math.sin(sweepRad)*(r+16)} stroke={combo>=10?"#00f5d4":"#ffd166"} strokeWidth={4} strokeLinecap="round" opacity={comboGlow*0.3} style={{filter:"blur(4px)"}}/>}
          <line x1={cx} y1={cy} x2={cx+Math.cos(sweepRad)*(r+12)} y2={cy+Math.sin(sweepRad)*(r+12)} stroke={phase==="listen"?"#ffd16666":combo>=5?"#00f5d488":"#00f5d466"} strokeWidth={phase==="play"?2:1.5} strokeLinecap="round"/>
          <circle cx={cx+Math.cos(sweepRad)*r} cy={cy+Math.sin(sweepRad)*r} r={phase==="play"?4:3} fill={phase==="listen"?"#ffd166":"#00f5d4"} opacity={0.9}/>
        </>}
        <circle cx={cx} cy={cy} r={3} fill={phase==="listen"?"#ffd166":"#00f5d4"} opacity={0.5}/>
      </svg>
      {floats.map(f=>{const a=f.angle01*TWO_PI-Math.PI/2,px=50+Math.cos(a)*28,py=50+Math.sin(a)*28;return(<div key={f.id} style={{position:"absolute",left:`${px}%`,top:`${py}%`,transform:"translate(-50%,-50%)",fontFamily:"'Orbitron'",fontSize:10,fontWeight:900,color:f.color,textShadow:`0 0 6px ${f.color}66`,animation:"fadeUp 0.8s ease-out forwards",pointerEvents:"none"}}>{f.text}</div>);})}
    </div>
  );
}

      <div style={{fontFamily:"'Orbitron'",fontSize:"clamp(22px,6vw,40px)",fontWeight:900,color:"#00f5d4",letterSpacing:5,textShadow:"0 0 40px #00f5d455, 0 0 80px #00f5d422"}}>RHYTHM WHEEL</div>
      <div style={{fontFamily:"'Orbitron'",fontSize:"clamp(9px,2vw,13px)",color:"#e63946",letterSpacing:6,marginTop:3,textShadow:"0 0 12px #e6394655"}}>LISTEN · REMEMBER · REPEAT</div>
      <div style={{margin:"28px auto",opacity:0.4}}>
        <svg viewBox="0 0 120 120" style={{width:100,height:100}}>
          <circle cx={60} cy={60} r={42} fill="none" stroke="#1a1a2e" strokeWidth={1}/>
          {[0,1,2,3,4,5,6,7].map(i=>{const a=(i/8)*TWO_PI-Math.PI/2;return<circle key={i} cx={60+Math.cos(a)*42} cy={60+Math.sin(a)*42} r={4} fill={i%2===0?"#00f5d433":"#1a1a2e"}/>;  })}
        </svg>
      </div>
      <div style={{fontSize:11,color:"#666",lineHeight:1.9,maxWidth:320,margin:"0 auto"}}>Classic melodies play as you learn.<br/>Listen, then tap the rhythm back.<br/>Beethoven, Mozart, Bach and more.<br/>Hit 60% accuracy to advance.</div>
      <div style={{marginTop:16,display:"flex",gap:12,justifyContent:"center",flexWrap:"wrap"}}>
        <div style={{display:"flex",gap:6,alignItems:"center"}}>
          <span style={{fontSize:8,color:"#555",letterSpacing:1}}>DRUMS:</span>
          {DRUM_KEYS.map((k,i)=>(<span key={i} style={{fontFamily:"'Orbitron'",fontSize:9,fontWeight:700,color:DRUM_VOICES[i].color,padding:"3px 6px",border:`1px solid ${DRUM_VOICES[i].color}44`,borderRadius:4}}>{k.toUpperCase()}</span>))}
        </div>
        <div style={{display:"flex",gap:6,alignItems:"center"}}>
          <span style={{fontSize:8,color:"#555",letterSpacing:1}}>MELODY:</span>
          {["J","K","L",";"].map((k,i)=>(<span key={i} style={{fontFamily:"'Orbitron'",fontSize:8,fontWeight:700,color:MELODY_COLOR+"88",padding:"2px 4px",border:`1px solid ${MELODY_COLOR}33`,borderRadius:3}}>{k}</span>))}
        </div>
      </div>
      <button onClick={onStart} style={{marginTop:24,fontFamily:"'Orbitron'",fontSize:13,fontWeight:900,letterSpacing:4,padding:"12px 30px",borderRadius:8,cursor:"pointer",background:"#00f5d412",border:"2px solid #00f5d4",color:"#00f5d4"}}>BEGIN</button>
      <div style={{marginTop:6,fontSize:9,color:"#444",letterSpacing:2}}>SPACE / ENTER</div>
    </div>
  );
}
